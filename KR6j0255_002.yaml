body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯次結蓮華塗香菩薩印二手蓮華合掌當胸上分散如塗香勢想從印中流出塗香雲海普遍供養一切如來海會即誦蓮華塗香真言曰唵巘馱布引惹慈攞反引三去麼曳摩賀跛娜麼二合矩羅二際致矩嚕三薩嚩羯麼引抳謎四跛娜麼二合悉地吽引五由結此印誦真言供養故獲得戒定慧解脫解脫知見五分法身次結檀波羅蜜菩薩印右手仰掌屈願度與智度相捻餘度皆舒即誦真言曰唵婆誐嚩底丁以反娜引曩引地跛帝尾娑㗚二合惹布引羅野娜引難娑嚩二合賀由結此印誦真言三遍即滅無量劫慳吝業種獲得三種施福所謂資生施無畏施法施即檀波羅蜜圓滿現生獲得富饒資緣具足心得自在壽命長遠次結戒波羅蜜菩薩印二手內相叉禪智直竪即誦真言曰唵試引攞馱引哩抳婆誐嚩底丁以反吽引二郝由結此印誦真言三遍即滅無量劫破戒業種獲得三種戒功德所謂律儀戒攝善法戒饒益有情戒即戒波羅蜜圓滿常以戒香莊嚴身口意業所有違犯四重禁苾芻苾芻尼犯八他勝罪悉皆清淨當來隨願得生淨妙佛剎次結忍波羅蜜菩薩印准前戒波羅蜜印以進力相合如針禪智並竪即誦真言曰嚩婆誐嚩底乞鏟二合引底馱引哩抳吽發吒由結此印誦真言三遍則滅無量劫瞋恚業種獲得三種忍功德所謂害怨耐忍安受苦忍諦察法忍則忍辱波羅蜜圓滿儀容端嚴令人樂見不相憎嫉皆來親附勝解尤深隨念變化次結精進波羅蜜菩薩印准前忍波羅蜜印進力坼開即成真言曰唵尾微一反引哩野二合迦里吽尾准前音引哩𧜟二合尾微一反引哩𧜟二合娑嚩二合賀由結此印誦真言三遍即滅無量劫懈怠懶惰業種獲得三種精進所謂被甲精進攝善法精進利樂有情精進則精進波羅蜜圓滿身心安樂離諸疾疹無有苦惱修世出世福智願皆得成辦次結禪波羅蜜菩薩印即結跏趺坐左手仰掌於加趺上以右手仰於左手上以禪智二度甲相拄即誦真言曰唵婆誐嚩底薩嚩播引賀引哩抳摩賀引奈引底曳二合引吽引吽引吽引吽引發吒由結此印誦真言三遍即滅無量劫散亂業種獲得三種靜慮所謂安住靜慮引發靜慮辦事靜慮即禪波羅蜜圓滿身心輕利所修神通速得成就諸魔不能侵擾一切業障悉皆消滅次結般若波羅蜜菩薩印左手平舒五指仰置心下以右手覆於左手上即誦真言曰唵地引一室哩二合引輸嚕二合多尾惹曳娑嚩二合賀由結此印誦真言三遍即滅無量劫愚癡業種獲得三種慧所謂人空無分別慧法空無分別慧俱空無分別慧則般若波羅蜜圓滿獲得聰明智慧悟解世間出世間法博達五明甚深義理次結方便波羅蜜菩薩印右手慧方握智度左手檀戒握禪度二手相博忍願相背直竪如針進力平舒側相拄即誦真言曰唵摩賀引每引怛囉二合唧帝娑嚩二合賀由結此印誦真言三遍即滅無量劫無善巧方便業種獲得二種方便善巧所謂回向方便善巧拔濟有情方便善巧即方便波羅蜜圓滿修持世間六波羅蜜由此印真言瑜伽相應少施功業福德廣多疾得成就皆至究竟成無上菩提資糧次結願波羅蜜菩薩印右手直竪五度以掌向外作施無畏勢即誦真言曰唵迦嚕抳尼貞反賀賀賀糝由結此印誦真言三遍即滅無量劫惡願業種獲得二種勝願所謂求無上菩提願利樂有情願即願波羅蜜圓滿從初發心乃至成佛於其中間所求世間出世間殊勝上願皆得圓滿次結力波羅蜜菩薩印准前戒波羅蜜印禪智進力忍願皆竪頭相合即誦真言曰唵娜麼𩕳母儞帝吽引賀賀賀吽引弱由結此印誦真言三遍即滅無量劫於世出世劣意業種獲得二種力所謂思擇力修習力於諸對治法伏得諸煩惱斷諸惑障修道時決定勝解一切天魔惡友不能移易獲得不退轉次結智波羅蜜菩薩印二手外相叉作拳檀慧直竪互交少分屈進力頭相拄令圓忍願直竪頭相合即誦真言曰唵麼麼枳娘二合引曩迦哩吽引娑嚩二合賀由結此印誦真言三遍即滅無量劫俱生我執種俱生法執種獲得二種受用智所謂受用法樂智成就有情智斷二種障所謂煩惱障所知障證得一切法如幻如陽焰如夢如影像如谷響如光影如水月如變化如因陀羅網如虛空不久滿足十地住法雲地為大法師次結白衣觀自在菩薩印二手內相叉作拳竪進力頭相拄令圓禪智並竪誦真言曰曩謨囉怛曩二合怛囉二合夜引野一娜莫阿去引哩野二合引嚩路引枳帝濕嚩二合囉引野二合二冒引地薩怛嚩二合引野三摩訶薩怛嚩二合引野四摩賀引迦引嚕抳迦引野五娜囉捨二合曩娑鉢二合捨曩引毗琰二合引嚩引六室囉二合嚩拏鼻音娑麼二合囉抳尼整反引曩嚩引寫引嚩拏七薩嚩薩怛嚩二合引南引八薩嚩弭野二合引地上吉蹉上迦九怛儞也二合他去引十羯𪘨尾羯𪘨羯徵羯𪘨十一羯吒尾羯吒羯徵羯𪘨十二婆去誐嚩底丁以反尾惹曳引娑嚩二合賀由結此印誦真言七遍蓮華部母聖者加持故諸魔毗那夜迦不得其便從初作先行時乃至求成就時念誦遍數奉獻此尊掌持設令出念誦處設誤失三業破三昧耶戒所有念誦功課定充先行成就數功不虛棄剋獲悉地或有惡人無辜作留難者想彼人在瑜伽者足下誦真言二十一遍所有作留難者悉皆消散慈心相向不能障礙次結大白觀自在菩薩印二手內相叉進力二度合竪微開禪智並竪即成真言曰曩謨囉怛曩二合怛囉二合夜引野一娜莫阿去引哩野二合引嚩路引枳帝濕嚩二合囉引野二引地薩怛嚩二合引野三摩賀引薩怛嚩二合引野四摩賀引迦引嚕抳迦引野五怛儞也二合他去引六濕吠二合引帝引七濕吠二合黨引霓引八濕吠二合多上部惹慈攞反九濕吠二合多嚩無撥反悉怛隸三合引十濕吠二合多麼上引隸引十一囉楞去聲呼訖哩二合帝引十二惹慈攞反曳引尾惹准上曳引十三阿上爾帝引阿上囉引爾帝十四引薩嚩悉馱娜莫娑訖哩三合帝引十五呬馨異反里弭里枳里十六捺囉捨二合野娑去引馱野娑嚩二合引賀十七由結此印誦真言三遍無量劫積集十不善黑業悉皆消滅一切善品白法無漏圓寂皆得圓滿瑜伽者真言久修持忽生疑惑欲知未來成不成善惡之事於欲眠寢時以衣覆頭以右手右旋摩其面誦此大白真言二十一偏即右脅而臥離諸思想唯觀念大白觀自在菩薩睡已須臾頃即夢見老人或見國王淨行見白衣少年婦人或見華果種種吉祥勝事當知未來剋獲成就殊勝吉祥若夢中見旃陀羅身著垢弊破衣服或見女人醜惡形容或見不吉祥之物當知所求事不成必有障礙次結多羅菩薩印准前大白印進力頭相合如針即成真言曰曩謨囉怛曩二合怛囉二合夜引野一娜莫阿去引哩野二合引二嚩路引枳帝濕嚩二合囉引野三引地薩怛嚩二合引野四摩賀引薩怛嚩二合引野五摩賀引迦引嚕抳迦引野六怛儞也二合他去聲引七唵跢去引㘑彈舌呼後同八咄跢去引㘑九咄咄𭌚娑嚩二合賀十由結此印誦真言三遍助本尊力令修瑜伽者於諸有情大悲尤深速獲成就次結祕句胝菩薩印准前多羅印進力微屈如蓮葉即成真言曰曩莫薩嚩怛他去引蘖帝引毗喻二合一囉曷二合毗藥二合三去藐三去母弟引毗藥二合二唵婆野曩引捨𩕳三怛囉二合引薩𩕳怛囉二合引娑野怛囉二合引細四鼻哩二合矩胝怛胝五吠微閉反引後同怛胝吠准上反怛胝六吠引囉胝吠引囉胝七濕吠二合帝惹致𩕳娑嚩二合引賀八由結此印誦真言三遍獲得威德自在諸障魔業不能侵擾次結本尊千手千眼觀自在菩薩根本印二手金剛合掌以忍願二度相合檀慧禪智四度坼開各直竪即成誦根本陀羅尼曰曩謨引囉怛曩二合怛囉二合夜引野一娜莫阿去引哩野二合引嚩路引枳雞以反帝濕嚩二合下無撥反囉引野二引地薩怛嚩二合引野三摩賀引薩怛嚩二合引野四摩賀引迦引嚕抳尼貞反迦引野五摩賀引尾引囉引野六娑上聲諸同賀娑囉二合引乞灑二合引野七娑賀娑囉二合室哩二合引灑引野八娑賀娑囉二合播引娜引野九娑賀娑囉二合爾慈以反引賀嚩二合引野十娑賀娑囉二合步惹自攞反引野十一曀呬婆去誐刎十二阿去引哩野二合引嚩路引枳准前音帝濕嚩二合囉十三塢疙囉二合阿上底庾二合疙囉二合十四摩賀引塢疙囉二合十五摩賀引曩引那十六枳里枳里枳里枳里十七弭里弭里弭里弭里十八唧里唧里唧里唧里十九曩跓胝魯反曩跓准上曩跓曩跓二十訖囉二合娑上聲下同訖囉二合娑訖囉二合娑訖囉二合娑二十一矩嚕轉舌下同矩嚕矩嚕矩嚕二十二曀醯去引呬二十三摩賀引尾引囉二十四麼上懶娜娜二十五尾引哩演二合引娜娜二十六薩嚩迦引𤚥引銘鉢囉二合拽蹉二十七試引伽囕二合重聲呼嚩陜銘二十八囉引瑟吒二合囉瑟鶹二合轉舌呼娑囉引惹自攞反競矩嚕二十九娑上賀娑囉二合步引惹准上三十娑賀娑囉二合尾引囉三十一路引髻引濕嚩二合囉娑去引馱野三十二娑娜引悉朕地淫反銘婆去嚩三十三嚩囉努引婆去嚩三十四阿麌嚕引婆嚩引弭三十五唵引曩謨引窣堵波三合帝婆去誐刎三十六阿去引哩野二合引嚩路引枳帝引濕嚩二合囉三十七鉢囉二合沒地野二合鉢囉二合枲引娜𤚥三十八引嚩囉努引麼麼三十九婆去嚩引呬娑嚩二合引賀引四十誦此陀羅尼七遍已頂上散印由結根本印誦此陀羅尼能作四種成就事一者息災二者增益三者降伏四者敬愛鉤召等所有希望世間出世間果報皆得滿願本教中所不說成就法者用蓮花部中法對此像前作必獲成就次結加持念珠印即取蓮子念珠安於掌中合掌當心誦淨珠真言加持七遍真言曰唵尾嚧引左曩引麼攞娑嚩二合引賀即捧珠頂戴然後以左手禪戒二度捻珠右手智方二度捻珠餘六度直竪當心相去二三寸許以千轉真言加持七遍真言曰唵嚩日囉二合獄呬野二合惹自攞反引跛三去麼曳引吽引即以二手各聚五度如未敷蓮華以智方二度移珠誦千手千眼陀羅尼一遍與娑嚩二合賀字齊聲移一珠如是念誦不緩不急不應出聲稱呼真言字令一一分明寂靜念誦離諸散亂一心專觀本尊勿緣異境或百或千常定其數念誦畢已捧珠頂戴至誠發願安珠本處修瑜伽者為求無上菩提發大淨信念念精誠於諸有情深起悲愍拔濟之心於自希望成就悉地行願以決定心志不移易晝夜精勤不憚劬勞從初作先行念誦承事時乃至求悉地成就時時不應問斷處所不移易遍數不應闕於一精室四時三時精誠念誦對本尊像前常辦外供養物隨自力分不令間斷如是依教修習不久當獲廣大成就如是觀智念誦畢已復結本尊印誦根本陀羅尼三遍不解此印誦蓮華部百字真言一遍頂上散印真言曰唵跛娜麼二合薩怛嚩二合一三去麼野麼努鼻播引攞野二跛娜麼二合薩怛嚩二合三怛吠二合引怒引跛底瑟姹二合四沒哩二合濯重聲呼引銘婆去嚩五素妬引數引銘婆嚩六阿努鼻囉訖妬二合引銘婆嚩七素報引數引銘婆嚩八薩嚩悉地淫二合上聲銘鉢囉二合拽磋九薩嚩羯磨素左銘十唧多上室哩二合藥矩嚕十一吽引賀賀賀賀斛引婆去誐鑁十二薩嚩怛他去引孽多十三跛那麼二合麼上引銘門上聲左十四跛娜弭二合引婆去嚩十五摩賀引三去摩野薩怛嚩二合惡入引十六由誦百字真言加持故能令本尊三摩地堅住身中設曾犯五無間罪謗方廣大乘經一切罪垢悉皆消滅現生所求殊勝悉地皆得圓滿復結八供養印各誦真言一遍復結十波羅蜜菩薩印及白衣觀自在等四大菩薩印各誦本真言一遍即獻閼伽心中所求希望隨便啓告即結三世勝菩薩印左轉解界即對聖衆前發露懺悔隨喜勸請回向發願次結奉送聖衆印如前金剛縛忍願直竪相拄如蓮葉即成以一時華置於印端捻之誦奉送真言一遍頂上散印真言曰唵訖哩二合垢引嚩無博反一薩嚩薩怛嚩二合引囉他二合二悉地捺跢引拽他去引努鼻誐引四孽攃陀鑁二合母馱尾灑閻五補曩囉引誐六麼曩引野覩七唵嚩日囉二合跛娜麼二合穆八引又以此奉送印加持心額喉頂即結灌頂印如前繫鬘被甲金剛拍掌各誦本真言一遍然後禮佛隨意出道場常令身心和悅住本尊瑜伽觀不應散亂常樂修諸善品每以香埿印塔助本尊瑜伽於念誦處數須塗拭及洗浴佛像旋繞有舍利窣堵波塔深入六念三摩地及三解脫門如是衆善所生有為無為福聚回向一切有情我所希望殊勝悉地願一切有情無諸障礙皆獲此成就金剛頂瑜伽千手千眼觀自在菩薩念誦法我今復說四種成就法所謂扇底迦法息災也白報瑟置二合迦法增益也黃嚩試羯囉拏法敬愛也赤阿毗遮嚕迦法降伏也黑若欲作息災法者面向北坐像面向南於本尊前塗拭圓壇觀本尊作白色所獻華果飲食并自身衣服皆作白色塗香用白檀燒香用沈水然酥燈以慈心相應從月一日初夜時起首至月八日一期滿每日三時澡浴三時換衣至日滿時或斷食或食三白食如是依法念誦則能除滅災難業障重罪或五星凌逼本命宿時感招種種災禍口舌鬪諍王官逼迫家國不和疾病飢儉鬼魅不祥悉皆殄滅獲得吉祥身心安樂所求如意修世出世行願無礙成就若作增益法者面向東坐像面向西本尊前塗拭方壇觀本尊作黃色所獻華果飲食并自身衣服等皆作黃色塗香用白檀加少鬱金燒白檀香然油麻油燈以喜悅心相應從月九日日出時起首至十五日一期滿准前三時澡浴三時換衣至日滿時准前斷食及三白食如是念誦能遷官榮及增壽命求福德聰慧名聞或求伏藏豐財眷屬象馬五穀成熟職仕王官得勢得力所求勝事皆得增益若作敬愛法者面向西坐像面向東本尊前塗蓮華形壇觀本尊作赤色身著緋衣所獻華果飲食等盡皆赤色塗香用鬱金燒香以丁香蘇合香蜜和燒之然諸果油燈以喜怒心相應從十六日後夜時起首至二十三日一期滿至日滿時澡浴斷食法准前如是念誦得一切人敬愛若家不和國不和怨敵伺求方便欲求彼此相敬和順者及令眷屬朋友恩義親厚承事官長得善顏色恩愛親者依此法求必得和順又欲求說法辨才言音威肅聞者喜悅聖賢加護天龍八部一切歡喜者當依此法精誠念誦所求速得滿願若作降伏法者面向南坐像面向北本尊前塗三角壇觀本尊作青色或黑色身著青黑衣獻青色華臭華不香華及蔓陀羅華等飲食用石榴汁染作黑色或作青色塗香用柏木閼伽用牛尿以黑色華及芥子柏木塗香等各取少分置閼伽木燒安悉香然芥子油燈以忿怒心相應誦馬頭明王真言或蓮華部使者一髻尊真言從二十四日午時或中夜時起首至月盡日一期滿滿日澡浴斷食法如前如是念誦能調伏毒惡鬼神及諸惡毒龍令國亢旱或風雨霜雹傷損苗稼疫病流行亦調伏惡人於國不忠殺害無量有情破滅佛教謗正法一闡提邪見惡人及諸外道斷善根者及侵害傳持正法者及背師僧父母不念恩德作留難者及諸惡獸蟲狼師子怨敵惡人欲相損害者如是等類作此法時彼等起惡心者如有覺觸身心不安或病或至不濟即勸彼令發善心若能悔過自責永斷惡心者即為彼人作息災法念誦彼等即免災難苦求出世間上上悉地速滿福德智慧二種資糧及滿足十地波羅蜜超越三無數劫難行難進又緣滅除內外諸障修行者決定一緣本尊三摩地三密相應心無間斷仗託諸佛菩薩大悲願力助護以三蜜成就資緣四印相應瑜伽者不應苦節邀期令心神散亂於定不進行住坐臥四威儀中令身心悅樂念念與勝義瑜伽相應於清淨法界常作觀行無時無方無晝無夜一道清淨猶如虛空於見聞覺知唯觀真如於名於相悉知阿上字無緣大悲自他平等常樂利樂無邊有情速令成就波羅蜜行等同觀自在菩薩若能如是修持或山間深谷殊勝巖窟清淨伽藍於四月四時專精念誦默斷語言策勵身心不耽著睡眠懈怠隨瑜伽者根性利鈍淨信勝解差別於其中間必獲輕安三昧現前即於定中見無數佛會聞妙法音證得十地位諸波羅蜜圓滿身心轉依於後十六大生證成無上菩提欲求出世間成就者已曾入金剛界大曼荼羅受本尊持明灌頂從阿闍梨具受契印真言瑜伽觀行依法畫本尊像隨力大小隨自愛樂吉祥福地兼助伴知法弟子及成就資緣具等其弟子須孝敬於師善順其意淨信深法住菩提心堪助伴於一種悉地共成心不移易求成就物有四種等類一者輪鉤釰杵鉞斧及棒錫杖等二者雌黃雄黃牛黃及諸藥類等三者取河兩岸土作諸禽獸形所謂象馬水牛雞雁孔雀金翅鳥等四者本尊像成就依蘇悉教法而作成就輪等及藥物禽獸形本尊像等長短分量形貌并及童女織成白㲲等依其中間隨墮其一而作成就具滿足真言先行遍數然後共助伴知法弟子限時限日限月限年晝夜以大精勤如人鑽火不應間斷求三種相現所謂暖煙光明等瑜伽者欲近成就時有種種障起應作降伏息災等護摩隨上中下成就物等或執或塗身或乘或手持飛騰虛空兼助伴知識或有人見於成就者或成就者見彼人總得飛騰遊諸世界供養諸佛菩薩皆壽命一大劫獲得初地百法明門若但依此念誦法或一時二時或三時四時於一淨室對尊像前結契念誦常不間斷現生必獲三業清淨所求世間榮華富貴皆悉成就獲得財寶豐饒人所樂見博達經論名聞十方諸佛菩薩擁護加持睡安覺安諸魔不能侵害臨命終時本尊現前將往極樂世界蓮華胎中上品上生證菩薩位受無上菩提記世尊聖者千眼千千千足千舌千臂觀自在菩提薩埵怛嚩廣大圓滿無礙大悲心陀羅尼􅑈􅝪􅁱􅝳􅑉􅝪􅁥跛娜麼二合薩怛嚩二合摩賀引薩怛嚩二合一路引計引濕嚩二合囉摩係濕嚩二合羅二阿上嚩路引枳帝引捨地引囉引疙哩野三合三嚩日囉二合達磨曩謨引窣堵二合帝四達磨囉引惹摩賀引秫詩聿反馱五薩怛嚩二合囉引惹摩賀引麼帝六跛娜麼二合引多麼二合迦摩賀引跛娜麼二合跛娜麼二合曩引他曩謨引窣堵二合帝八跛娜謨二合引納婆二合嚩素跛娜麼二合引婆去九跛娜麼二合秫同前馱素戌引馱迦十嚩日囉二合跛娜麼二合素跛娜莽二合引誐十一跛娜麼二合跛娜麼二合曩謨引窣堵二合帝十二摩賀引尾濕嚩二合摩賀引路引迦十三摩賀引迦引哩野二合引摩護引跛莫十四摩賀引地引囉摩賀引味引囉十五摩賀引少去引㘑曩謨引窣堵二合帝十六薩怛嚩二合引捨野摩賀引夜引曩十七摩賀引喻引誐尾跢引麼郝十八苫去引暴引餉迦囉秫詩聿反馱引囉他二合十九母馱跛娜麼二合曩謨引窣堵二合帝二十達磨怛怛嚩二合引囉他二合引薩達磨二十一秫詩聿反馱達磨素達磨訖嘌二合入二十二摩賀引達磨素達磨引疙哩野三合二十三達磨斫訖囉三合曩謨引窣堵二合帝二十四母馱薩怛嚩二合素薩怛嚩二合引疙哩野三合二十五達磨薩怛嚩二合素薩怛嚩二合地哩二合入二十六薩怛舞二合引答麼素薩怛嚩二合抧娘二合二十七薩怛嚩二合薩怛嚩二合曩謨引窣堵二合帝二十八阿嚩路引枳多曩引他去引疙哩野三合二十九摩賀引曩他尾路引枳多三十阿去引路引迦路引迦引囉他二合三十一路引迦曩引他曩謨引窣堵二合帝三十二路引迦引乞灑二合囉引乞灑二合囉摩𮋖引三十三曩乞灑二合囉引疙哩野三合乞灑二合嚧引跛莫三十四阿上乞灑二合囉引乞灑二合囉薩嚩引乞灑二合三十五斫訖囉二合乞灑二合囉曩謨引窣堵二合帝三十六跛娜麼二合賀娑多二合摩賀引賀婆多二合三十七三去麼引濕嚩二合引娑迦娜引野腳三十八秫詩聿反馱達磨摩賀引母馱三十九母馱引多麼二合迦曩謨引窣堵二合帝四十母馱嚕引跛摩賀引嚕引跛四十一嚩日囉二合嚕引跛素嚕引跛嚩無撥反四十二達磨引跛引迦素帝引惹慈攞反引疙哩野三合四十三路引迦路引迦曩謨引窣堵二合帝四十四跛娜麼二合窒哩二合引曩引他引曩引他疙哩野三合四十五達磨室哩二合引曩引他曩引他鑁引四十六沒囉二合憾麼二合曩引他摩賀引沒囉二合憾麼二合四十七沒囉二合憾麼二合補怛囉二合曩謨引窣堵二合帝四十八儞引泥以反後同跛儞引播引疙哩野三合儞引布引疙哩也三合四十九儞引播路引迦素儞引跛腳五十儞引跛曩引他摩賀引儞引跛五十一母馱引鼻色訖多二合母馱引疙哩野三合五十三母馱補怛囉二合摩賀引母馱五十四母馱引鼻曬引迦沒引馱疙哩野二合五十五母馱母馱曩謨引窣堵二合帝五十六母馱斫乞芻二合引摩賀引斫乞芻二合引五十七達磨斫乞芻二合引摩奚上乞灑二合拏五十八三去麼引地抧娘二合引曩薩嚩婆嚩二合五十九嚩日囉二合寧引怛囉二合曩謨引窣堵二合帝六十曳引曩薩嚩引多麼二合曩引矯魚嬌反引喃六十一曩引麼上引瑟吒二合捨多上達多嚩六十二婆去引嚩曳引窣堵二合努鼻音夜引娜嚩二合引粃六十三路引計引濕嚩二合下無撥反哩野二合麼上嚩引補努鼻聲帝引底丁以反六十四
