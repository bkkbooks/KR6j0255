body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯我依瑜伽金剛頂經說蓮華部千手千眼觀自在菩薩身口意金剛祕密修行法行者應從瑜伽阿闍梨處求受菩提心律儀戒入大曼荼羅受灌頂位勝解行地捨身命財勇猛精進懷悲愍心不厭生死決定求證普賢菩薩身歷侍諸佛樂修勝義般若波羅蜜具慈悲喜捨饒益有情或於山間勝地間淨之處或於清淨伽藍及舍利塔前修治精室塗拭壇場周匝懸幡上施天蓋於壇西面安千手千眼觀自在菩薩像持誦者於壇東對像敷茅薦為座或坐被腳小床壇上分布曼荼羅列諸聖位置二閼伽滿盛香水安四寶瓶於壇四角每日取種種時花散於壇上燒香塗香燈明飲食及諸果子加持分布四邊供養每入道場虔誠作禮發露懺悔隨喜勸請回向發願即運心觀想遍滿虛空一切如來具諸相好皆入法界定又觀自身住佛海會中即結警覺一切如來印二手各作金剛拳檀慧相鉤直舒進力二度側相拄真言以印三舉真言曰唵嚩日嚕二合引底瑟姹二合由結此印誦警覺真言一切如來皆從定出瑜伽者應作是思惟啓告諸佛我身少慧少福沒於苦海仗託諸佛威神之力唯願不捨大悲本願慈悲矜愍觀察護念拔濟於我彼一切如來各以神力加持護念修瑜伽者獲無量福身心自在次應禮四方如來請求加護先禮東方阿閦如來等一切如來瑜伽者即以全身委地二手金剛合掌長舒頂上以心著地至誠敬禮真言曰唵薩嚩怛他去引孽多一布引儒鏃固反引跛娑他二合引曩引夜引多麼二合引南二𩕳哩野二合引多夜引銘三薩嚩怛他去引孽多四嚩日囉二合薩怛嚩二合地瑟姹二合娑嚩二合𤚥引五吽由結捨身印及誦真言奉獻供養禮敬故瑜伽者由作此禮乃至成佛常得金剛薩埵加持令菩提心圓滿次禮南方寶生如來等一切如來如前展身委地金剛合掌下當心以額著地至誠禮敬真言曰唵薩嚩怛他去引孽多一布引惹慈攞反引鼻曬引迦引夜引多麼二合引南二𩕳哩野二合引多上夜引銘三薩嚩怛他去引蘖多四嚩日囉二合囉怛曩二合鼻詵去左娑嚩二合𤚥引五怛𠸪二合由結捨身印及誦真言奉獻供養禮敬故乃至成佛地地中常得虛空藏菩薩受與灌頂福德圓滿具諸相好當為三界法王次禮西方無量壽如來等一切如來如前展身金剛合掌置於頂上以口著地至誠敬禮真言曰唵薩嚩怛他去引蘖多一布引惹慈攞反鉢囉二合𮧬怛曩引夜引多麼二合引南二𩕳哩野二合引多上夜引銘三薩嚩怛他去引蘖多四嚩日囉二合達磨鉢囉合𮧬怛野娑嚩二合𤚥五引紇唎二合由結捨身印及誦真言奉獻供養禮敬故乃至成佛常得觀自在菩薩加持智慧圓滿轉妙法輪次禮北方不空成就如來等一切如來展身如前金剛合掌置於當心以頂著地至誠敬禮真言曰唵薩嚩怛他去引蘖多一布引惹慈攞反引羯麼抳阿去引多麼二合引南二𩕳哩野二合多上夜引銘三薩嚩怛他去引蘖多四嚩日囉二合羯麼矩嚕娑嚩二合𤚥引五噁由結捨身印及誦真言奉獻供養禮敬故乃至成佛常得金剛業菩薩加持於一切佛世界成就廣大供養業然後結跏趺坐端身正念不動支節閉目寂靜入四無量心觀即結定印初入慈無量心定以殷淨心遍緣六道四生一切有情皆具如來藏備三種身口意金剛以我修三密功德力故願一切有情等同普賢菩薩如是觀已即誦大慈三摩地真言曰唵摩賀引昧引怛囉夜三合引娑頗二合囉次應入悲無量心三摩地智以悲愍心遍緣六道四生一切有情沈溺生死苦海不悟自心妄生分別起種種煩惱隨煩惱是故不達真如平等如虛空超恆沙功德以我修三密加持力故願一切有情等同虛空藏菩薩如是觀已即誦大悲三摩地真言曰唵摩賀引迦嚕拏上夜引娑頗二合囉次應入喜無量心三摩地智以清淨心遍緣六道四生一切有情本來清淨猶如蓮華不染客塵自性清淨以我修三密功德力故願一切有情等同觀自在菩薩如是觀已即誦大喜三摩地真言曰唵秫詩律反馱鉢囉二合謨引娜娑頗二合囉次應入捨無量心三摩地智以平等心遍緣六道四生一切有情皆離我我所離蘊界及離能取所取於法平等心本不生性相空故以我修三密功德力故願一切有情等同虛空庫菩薩如是觀已即誦大捨三摩地真言曰唵摩護引閉乞灑二合引娑頗二合囉瑜伽者由修習四無量心定誦四無量心真言於未來所有人天種種魔業障難悉皆除滅身中頓集無量福聚心得調柔堪任自在次結金剛合掌印二手十度右押左互相交即成真言曰唵嚩日囉二合引惹慈攞反里由結金剛合掌印速得滿足十波羅蜜得十自在次結金剛縛印即以前印十度外相叉作拳即成真言曰唵嚩日囉二合滿馱由結金剛縛印瑜伽者速得十地滿足次結摧十種障金剛縛印如前金剛縛以印三度掣拍心上即成真言曰唵嚩日囉二合滿馱怛囉二合吒由結此印能摧滅心中十種惑障則顯現發揮身口意金剛次結金剛遍入印如前金剛縛印禪智屈入掌各捻戒方置於心上真言曰唵嚩日囉二合引吠微閉反捨惡由結此印瑜伽者身中三密金剛皆得順伏加持不散次結金剛拳三昧耶印如前金剛遍入印進力屈拄禪智背即成真言曰唵嚩日囉二合母瑟置二合鑁由結金剛拳三昧耶印身口意金剛合為一體修瑜伽者速得一切成就次結三昧耶印如前金剛縛直竪忍願相合即成誦真言三遍真言曰唵三去麼野娑怛鑁三合即觀自身等同金剛薩埵處在月輪又觀金剛薩埵在身前如鏡中像與身相對等無有異由結此印誦真言觀念相應故即得於一切印為主宰次結大三昧耶真實印二手金剛縛忍願屈入掌面相合檀慧禪智直竪相合以忍願頭頻觸心上真言曰唵三去麼野斛引素囉多娑怛鑁三合由結此印警覺瑜伽者身中金剛薩埵以威神加持行者速得成就普賢菩薩身次結三世勝菩薩印二手各作金剛拳右手加左手上檀慧反相鉤直竪進力安印當心誦真言三遍真言曰唵遜婆去一𩕳遜婆去引吽短聲後同二疙囉二合釁拏二合疙囉二合釁拏二合吽三疙囉二合釁拏二合跛野吽四阿上引曩野斛引婆去誐鑁嚩日囉二合吽並短聲發吒即入金剛忿怒威光熾盛三世勝三摩地此菩薩有四面皆忿怒八臂各執器仗左足踏烏摩如丁字勢立遍身火焰炯燃如劫災火此即三世勝聖者三摩地觀也修行者應住菩提心深起悲愍滅除內外人天等障即以印左轉三匝辟除障者便右轉三匝隨意大小結為方隅界即印心額喉頂各誦一遍頂上散印由結此印誦真言住此忿怒三摩地身心所有煩惱業障以金剛猛利慧火焚燒悉盡次結蓮華三昧耶印如前金剛縛檀慧禪智竪相合置於口上誦真言曰唵嚩日囉二合跛娜麼二合三去麼野娑怛鑁三合瑜伽者作是思惟我今此身等同觀自在菩薩想左手當心執蓮華右手作開敷華勢住圓滿月輪中了了分明由結此印誦真言加持故一切三摩地一切方便般若波羅蜜速得成就次結三摩地印如前金剛縛仰安跏趺上進力屈中節竪拄背禪智橫相拄於進力上即誦真言曰唵三去麼地跛娜銘二合紇哩入引二合瑜伽者端身正坐儼然不動想自身在一切如來海會觀一一佛身微細由如胡麻相好具足了了分明即入觀自在菩薩觀智作是思惟一切法本來清淨我亦清淨於世間貪愛清淨故則瞋恚清淨於世間塵垢清淨故則一切罪清淨於世間一切法清淨故則一切有情清淨於世間般若波羅蜜多清淨故則薩婆若清淨瑜伽者作是觀已身心豁然清淨即誦通達心真言曰唵唧多上鉢囉二合底丁以反吠微閉反引鄧迦嚕引弭瑜伽者誦無限數當證二無我顯現如來藏證圓滿菩提心即誦菩提心真言曰唵冒引地唧多上母多跛二合娜夜引弭即閉目澄心觀自身中正當胸間有圓滿清淨潔白滿月一心專注更不易緣於圓明上想有八葉蓮華於蓮華胎中觀紇哩二合字如紅頗梨色即誦加持蓮華真言曰唵底瑟姹二合跛娜麼二合想其蓮華漸舒漸大乃至遍滿小千世界及中千世界大千世界其華具大光明照曜六道衆生滅除一切苦惱彼等獲得安樂悅喜即誦引蓮華真言曰唵娑頗二合囉跛娜麼二合復想是蓮華漸斂漸小量等己身即誦斂蓮華真言曰唵僧去賀囉跛娜麼二合又想空中一切如來悉皆入此蓮華中合為一體其蓮華變成觀自在菩薩身紅玻梨色坐蓮華臺上首戴寶冠冠中有化佛了了分明以決定心如是觀已即誦自身成本尊瑜伽真言曰唵嚩日囉二合達謨引含由誦此真言加持故瑜伽者自身與本尊身等無有異次結加持印如前金剛縛進力合竪屈如蓮葉禪智並竪即成以印加持四處所謂心額喉頂各誦一遍真言曰唵嚩日囉二合達麼引地瑟姹二合娑嚩二合𤚥引由結此印加持故修行者威德自在離諸障難本尊瑜伽速得成就次結佛寶冠灌頂印如前金剛縛忍願直竪進力相拄如蓮葉安於額上誦真言三遍真言曰唵怛他去引蘖多達麼吽引由結此印及誦真言則獲得無量壽如來寶冠灌頂次結蓮華鬘印二手各作蓮華拳當額如繫鬘相繞三匝即分頂後亦繞三匝兩邊徐徐下如垂帶勢從檀慧度次第舒散十度誦真言曰唵跛娜麼二合麼上引黎達麼紇哩二合入引𤚥由結蓮華鬘印當得為蓮華部中法王次結金剛甲胄印二手各作金剛拳直舒進力於二度端想唵砧謫簪反二字即誦被甲胄真言曰唵嚩日囉二合迦嚩左嚩日哩二合引矩嚕嚩日囉二合嚩日囉二合含隨誦真言以進力二度初於心上相繞三匝分至背後亦相繞還却至臍相繞次繞右膝還至臍背相繞次至腰後却至心前次繞右肩次繞左肩次至喉復至頸後至額前後至腦後每處皆相繞三匝如前徐徐兩邊下如垂帶勢從檀慧度次第散十度便以二手旋拳如舞當心三度拍掌即誦拍掌真言曰唵跛娜麼二合覩史野二合斛引由結金剛甲胄印乃至成佛於一切處一切生常被大慈金剛甲胄莊嚴身心求世出世間悉地速疾成就內外諸障毗那夜迦不能侵嬈由誦真言金剛拍掌故一切聖衆悉皆歡喜次於下方空中想憾胡感反字其字如染玄色漸舒漸廣成大風輪於風輪上想𤚥摸感反字白色漸引漸大與風輪相稱變為水輪於水輪上想鉢囉二合字金色稱其水輪成一金龜於龜背上想素字變為妙高山四寶所成又想劍平字變成金山七重圍繞則於妙高山上虛空中想毗盧遮那佛遍身毛孔流出香乳雨澍七山間以成八功德香水乳海於妙高山頂上想有八葉大蓮華於蓮華上有八大金剛柱成寶樓閣於蓮華胎中想紇哩二合字從字流出大光明遍照一切佛世界所有受苦衆生遇光照觸皆得解脫於此大光明中涌出千手千眼觀自在菩薩具無量相好熾盛威德十波羅蜜菩薩周匝圍繞八供養菩薩各住本位於寶樓閣四隅有白衣大白多羅毗俱胝等四大菩薩各與無量蓮華部衆前後圍繞諸天八部以為眷屬如是觀想無量聖衆及本尊極須分明勿令忘失次第即結才發意轉法輪菩薩印二手各作金剛拳進力檀慧相鉤結即誦真言曰唵嚩日囉二合斫訖囉二合吽𠺁吽鑁斛引即以印置於身前壇上即成蓮華部世調伏大曼荼羅以印安於心上即自身成大曼荼羅以印觸本尊像彼像或畫或銅或塑皆成大曼荼羅以印置身前空中即滿虛空界成大曼荼羅修行者設有越法誤失三業破三昧耶戒由結此印誦真言加持故能除諸過皆得圓滿次結普請警覺一切聖衆印如前金剛縛直竪忍願進力屈如鉤即成瑜伽者應