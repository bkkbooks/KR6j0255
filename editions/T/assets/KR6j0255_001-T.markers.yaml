  - {type: variant, offset: 4282, length: 177, content: '惹自攞反切野覩沒哩二合鼻聲＝鼻聲二合【明】二合鼻聲【大】，鼻聲二合【明】二合鼻聲鼻聲二合拏上上聲引＝切【明】引【大】，切【明】引切羅餉佉惹准＝同【明】准【大】，同【明】准同

      上吒計捨迦羅＝邏【三】【甲】羅【大】，邏【宋】【元】【明】【甲】羅邏引跛馱囕一　鉢娜麼二合嚩𠻴引

      誐拽瑟置二合怛囉二合野寗引怛囉二合娑賀娑囉二合步簪自含＝合【明】含【大】，合【明】含合反切二　娑怛多那莫娑訖哩三合妬＝姤【三】【甲】妬【大】，姤【宋】【元】【明】【甲】妬姤引粃尾儞野二合引馱囉禰＝儞【三】禰【大】，儞【宋】【元】【明】禰儞引嚩誐喃三　阿賀麼上上聲嚩路引枳帝引濕嚩二合囉麌囕娑多上上聲單鉢囉二合拏多入聲四　跛娜麼二合囉引誐𩕳

      寧逸反切麼上上聲藍五　迦引麼上上聲囉引誐母答𤚥六　路引

      迦曩引他曼馱銘引七　薩嚩秫詩律聿反切馱悉地野三＝二【三】【甲】【乙】＊三【大】＊，二【宋】【元】【明】【甲】【乙】＊三二合左八＝入【明】八【大】，入【明】八入', 丙: ''}
